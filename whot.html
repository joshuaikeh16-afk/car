<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ludo - Nigerian Style</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1b2e;
      color: white;
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      color: #ffd700;
      margin-bottom: 10px;
      text-shadow: 0 0 15px #ffd700;
    }

    #game {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #board {
      width: 420px;
      height: 420px;
      background: #1e2a44;
      border: 12px solid #333;
      border-radius: 12px;
      position: relative;
      box-shadow: 0 15px 40px rgba(0,0,0,0.8);
    }

    .path {
      position: absolute;
      background: #2a3a55;
    }

    /* Simple board layout using grid */
    .square {
      position: absolute;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      border: 2px solid #111;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.6);
    }

    .home {
      background: #111;
      border-radius: 8px;
    }

    .red { background: #e63939; }
    .blue { background: #457b9d; }
    .green { background: #2a9d8f; }
    .yellow { background: #f4a261; }

    .piece {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .piece:hover {
      transform: scale(1.2);
    }

    #dice-area {
      text-align: center;
      margin-top: 20px;
    }

    #dice {
      font-size: 4.5rem;
      cursor: pointer;
      transition: transform 0.3s;
    }

    #dice:hover {
      transform: rotate(20deg);
    }

    button {
      margin-top: 15px;
      padding: 12px 30px;
      font-size: 1.2rem;
      background: #ff2e63;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    #status {
      font-size: 1.4rem;
      margin: 15px 0;
      min-height: 30px;
    }

    .back-btn {
      margin-top: 20px;
      padding: 10px 25px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Ludo 🇳🇬</h1>
  <div id="status">Your turn (Red) - Roll the dice!</div>

  <div id="game">
    <div id="board">
      <!-- Board squares will be created by JS -->
    </div>
  </div>

  <div id="dice-area">
    <div id="dice" onclick="rollDice()">🎲</div>
    <button onclick="rollDice()">Roll Dice</button>
  </div>

  <button class="back-btn" onclick="window.location.href='index.html'">← Return to Menu</button>

  <script>
    // Simple Ludo board positions (simplified)
    let board = Array(52).fill(null); // Main track
    let homes = { red: [], blue: [], green: [], yellow: [] };
    let currentPlayer = 'red';
    let diceValue = 0;

    const players = ['red', 'blue', 'green', 'yellow'];
    let playerPositions = {
      red: [0, 0, 0, 0],
      blue: [0, 0, 0, 0],
      green: [0, 0, 0, 0],
      yellow: [0, 0, 0, 0]
    };

    function rollDice() {
      diceValue = Math.floor(Math.random() * 6) + 1;
      document.getElementById('dice').textContent = diceValue;
      
      if (currentPlayer === 'red') {
        document.getElementById('status').textContent = `You rolled ${diceValue}! Click your piece to move.`;
      } else {
        botTurn();
      }
    }

    function botTurn() {
      document.getElementById('status').textContent = `Bot (${currentPlayer}) is thinking...`;
      setTimeout(() => {
        // Simple bot: move first piece possible
        const pos = playerPositions[currentPlayer];
        for (let i = 0; i < 4; i++) {
          if (pos[i] < 52) {
            pos[i] += diceValue;
            if (pos[i] > 52) pos[i] = 52;
            break;
          }
        }
        currentPlayer = players[(players.indexOf(currentPlayer) + 1) % 4];
        document.getElementById('status').textContent = `Your turn (Red)`;
      }, 1200);
    }

    // Initialize board (simplified version)
    function initBoard() {
      document.getElementById('status').textContent = "Your turn (Red) - Roll the dice!";
    }

    initBoard();
  </script>
</body>
</html>
