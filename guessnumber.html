<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Hunter | Hub Games</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --primary: #00f2ff;
      --secondary: #7000ff;
      --bg: #05010a;
      --text: #ffffff;
      --glass: rgba(255, 255, 255, 0.05);
    }

    body { 
      font-family: 'Segoe UI', system-ui, sans-serif; 
      text-align: center; 
      background: var(--bg); 
      background-image: 
        linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      color: var(--text);
      min-height: 100vh; 
      margin: 0; 
      display: flex; 
      flex-direction: column; 
      align-items: center;
      justify-content: center; 
    }

    .game-card {
      background: var(--glass);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
      width: 90%;
      max-width: 400px;
    }

    h1 { 
      font-size: 2.2rem;
      margin-top: 0;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #info { color: #888; margin-bottom: 20px; }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    input { 
      font-size: 2rem; 
      padding: 15px; 
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 2px solid #333;
      border-radius: 15px; 
      color: var(--primary);
      text-align: center;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    input:focus { 
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
    }

    .btn-main { 
      width: 100%;
      padding: 16px;
      font-size: 1.2rem;
      font-weight: bold;
      background: linear-gradient(135deg, var(--secondary), #4b00ff);
      color: white; 
      border: none;
      border-radius: 15px;
      cursor: pointer; 
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-main:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(112, 0, 255, 0.4);
    }

    #message { 
      font-size: 1.2rem; 
      margin-top: 25px; 
      min-height: 30px; 
      line-height: 1.4;
    }

    .stats {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #555;
    }

    .menu-btn {
      background: transparent;
      border: 1px solid #333;
      padding: 10px 20px;
      color: #666;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 40px;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .menu-btn:hover { border-color: #fff; color: #fff; }

    #reset-btn { display: none; margin-top: 15px; background: #333; }
  </style>
</head>
<body>

  <div class="game-card">
    <h1><i class="fas fa-microchip"></i> Num Hunter</h1>
    <p id="info">System generated a value (1-100)</p>
    
    <div class="input-group">
      <input type="number" id="guess" placeholder="??" min="1" max="100">
    </div>

    <button class="btn-main" id="check-btn" onclick="checkGuess()">SUBMIT GUESS</button>
    <button class="btn-main" id="reset-btn" onclick="resetGame()">PLAY AGAIN</button>

    <div id="message"></div>
    <div class="stats">Attempts: <span id="count">0</span></div>
  </div>

  <a href="choose.html" class="menu-btn">← Return to Hub</a>

<script>
  let secret;
  let attempts = 0;

  function resetGame() {
    secret = Math.floor(Math.random() * 100) + 1;
    attempts = 0;
    document.getElementById("count").textContent = "0";
    document.getElementById("message").textContent = "";
    document.getElementById("guess").value = "";
    document.getElementById("guess").disabled = false;
    document.getElementById("check-btn").style.display = "block";
    document.getElementById("reset-btn").style.display = "none";
    document.getElementById("guess").focus();
  }

  function checkGuess() {
    const guessInput = document.getElementById("guess");
    const guess = Number(guessInput.value);
    const msg = document.getElementById("message");
    const countDisplay = document.getElementById("count");

    if (!guess || guess < 1 || guess > 100) {
      msg.textContent = "Input out of range (1-100) ⚠️";
      msg.style.color = "#ff2e63";
      return;
    }

    attempts++;
    countDisplay.textContent = attempts;

    if (guess === secret) {
      msg.innerHTML = `ACCESS GRANTED 🎉<br>Number was <strong>${secret}</strong>`;
      msg.style.color = "#00ff9d";
      guessInput.disabled = true;
      document.getElementById("check-btn").style.display = "none";
      document.getElementById("reset-btn").style.display = "block";
    } else if (guess < secret) {
      msg.textContent = "Too low. Scan higher ↑";
      msg.style.color = "#00f2ff";
    } else {
      msg.textContent = "Too high. Scan lower ↓";
      msg.style.color = "#00f2ff";
    }

    guessInput.value = "";
    guessInput.focus();
  }

  // Handle "Enter" key
  document.getElementById("guess").addEventListener("keypress", function(e) {
    if (e.key === "Enter") checkGuess();
  });

  // Initial Start
  resetGame();
</script>
</body>
</html>
