<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Bikes | Car Haven Tech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        :root {
            --electric-violet: #8b5cf6;
            --neon-blue: #0ea5e9;
            --dark-panel: #111827;
            --text-gray: #9ca3af;
            --glow: rgba(139, 92, 246, 0.4);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #030712;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #030712 100%);
            color: white;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 92%;
            margin: 40px auto;
            padding: 50px;
            background: var(--dark-panel);
            border-radius: 32px;
            border: 1px solid rgba(139, 92, 246, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Ambient background glow */
        .container::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 200px; height: 200px;
            background: var(--neon-blue);
            filter: blur(120px);
            opacity: 0.1;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            text-transform: uppercase;
            letter-spacing: -1px;
            margin: 10px 0 20px 0;
            background: linear-gradient(to right, #fff, var(--neon-blue), var(--electric-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .description {
            color: var(--text-gray);
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto 40px auto;
        }

        /* --- Tech Dashboard --- */
        .tech-dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .tech-card {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .tech-card:hover { border-color: var(--electric-violet); }

        .tech-card i { color: var(--neon-blue); font-size: 1.5rem; margin-bottom: 10px; }
        .tech-card div { font-size: 0.75rem; text-transform: uppercase; color: #555; }
        .tech-card strong { font-size: 1.2rem; display: block; color: #fff; }

        /* --- Image Showcase --- */
        .img-display {
            width: 100%;
            height: 400px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            margin-bottom: 40px;
        }

        .img-display img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .img-display:hover img { transform: scale(1.05); }

        /* --- Button Action --- */
        .purchase-btn {
            background: linear-gradient(135deg, var(--neon-blue), var(--electric-violet));
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .purchase-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px var(--glow);
            filter: brightness(1.1);
        }

        .return-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--text-gray);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .return-link:hover { color: var(--neon-blue); }

        .tech-badge {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--electric-violet);
            color: var(--electric-violet);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .center { text-align: center; }

        @media (max-width: 600px) {
            .tech-dashboard { grid-template-columns: 1fr; }
            .container { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="center">
            <span class="tech-badge">Voltage Series 2026</span>
            <h1>Electric Bikes</h1>
            <p class="description">
                High-torque propulsion meets surgical carbon engineering. The future of commuting isn't just electric—it's exhilarating.
            </p>
        </div>

        <div class="tech-dashboard">
            <div class="tech-card">
                <i class="fas fa-bolt"></i>
                <div>Peak Power</div>
                <strong>750W Motor</strong>
            </div>
            <div class="tech-card">
                <i class="fas fa-battery-three-quarters"></i>
                <div>Max Range</div>
                <strong>85 Miles</strong>
            </div>
            <div class="tech-card">
                <i class="fas fa-tachometer-alt"></i>
                <div>Top Assist</div>
                <strong>28 MPH</strong>
            </div>
        </div>

        <div class="img-display">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQvjT6vGG7vBqPV8sBpreFm3NTPbeCFTqKq9A&s" alt="Modern E-Bike">
        </div>

        <div class="center">
            <a href="https://www.wheelseco.com/product_list/1268858846368522240.html" class="purchase-btn">
                Power Up <i class="fas fa-plug" style="margin-left: 10px;"></i>
            </a>
            <br>
            <a href="bikes.html" class="return-link">← Back to Two-Wheel Division</a>
        </div>
    </div>

</body>
</html>
