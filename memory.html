<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Match</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    text-align: center; 
    background: linear-gradient(to bottom, #e8f5e9, #c8e6c9); 
    min-height: 100vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
  }
  h1 { color: #388e3c; }
  #board {
    display: grid;
    grid-template-columns: repeat(4, 90px);
    gap: 12px;
    margin: 30px auto;
    justify-content: center;
  }
  .card {
    width: 90px;
    height: 90px;
    background: #4caf50;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.8rem;
    cursor: pointer;
    transition: transform 0.3s;
    color: white;
  }
  .card.flipped, .card.matched {
    background: #fff176;
    color: #000;
    transform: rotateY(180deg);
  }
  #status { font-size: 1.6rem; margin: 20px; color: #2e7d32; }
  button { 
    padding: 12px 30px; 
    font-size: 1.2rem; 
    background: #388e3c; 
    color: white; 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    margin-top: 20px; 
  }
</style>
</head>
<body>
<h1>Memory Match</h1>
<div id="board"></div>
<div id="status">Find all matching pairs!</div>
<button onclick="startGame()">New Game</button>

<script>
  const emojis = ['🍎','🍌','🍇','🍓','🍊','🍉','🍍','🍒'];
  let cards = [...emojis, ...emojis];
  let flipped = [];
  let matched = [];

  function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  function startGame() {
    cards = shuffle(cards);
    matched = [];
    flipped = [];
    const board = document.getElementById('board');
    board.innerHTML = '';

    cards.forEach((emoji, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.value = emoji;
      card.dataset.index = i;
      card.onclick = () => flipCard(card);
      board.appendChild(card);
    });

    document.getElementById('status').textContent = "Find all matching pairs!";
  }

  function flipCard(card) {
    if (flipped.length === 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;

    card.classList.add('flipped');
    card.textContent = card.dataset.value;
    flipped.push(card);

    if (flipped.length === 2) {
      checkMatch();
    }
  }

  function checkMatch() {
    const [card1, card2] = flipped;

    if (card1.dataset.value === card2.dataset.value) {
      card1.classList.add('matched');
      card2.classList.add('matched');
      matched.push(card1, card2);
      flipped = [];

      if (matched.length === cards.length) {
        setTimeout(() => {
          alert("You won! 🎉 Great job!");
          startGame();
        }, 600);
      }
    } else {
      setTimeout(() => {
        card1.classList.remove('flipped');
        card2.classList.remove('flipped');
        card1.textContent = '';
        card2.textContent = '';
        flipped = [];
      }, 1000);
    }
  }

  startGame(); // auto start
</script>
</body>
</html>
