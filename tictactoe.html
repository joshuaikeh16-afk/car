<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic-Tac-Toe • Play with Bot</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --bg: #0a0015;
      --board: rgba(20, 10, 45, 0.7);
      --cell: rgba(40, 20, 80, 0.55);
      --x: #ff2e63;
      --o: #00ff9d;
      --glow-x: rgba(255, 46, 99, 0.5);
      --glow-o: rgba(0, 255, 157, 0.5);
      --text: #f0e6ff;
      --text-dim: #a090c0;
      --border: rgba(255,255,255,0.08);
      --win: #ffd700;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-image: 
        radial-gradient(circle at 15% 85%, #ff2e6322 0%, transparent 40%),
        radial-gradient(circle at 85% 15%, #7b2cff22 0%, transparent 40%);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      background: linear-gradient(90deg, var(--x), var(--o), #7b2cff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(255,46,99,0.4);
      letter-spacing: -1px;
    }

    #status {
      font-size: 1.5rem;
      margin: 20px 0;
      min-height: 40px;
      font-weight: 600;
      text-shadow: 0 0 10px rgba(255,221,87,0.5);
      transition: color 0.4s;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-gap: 12px;
      background: var(--board);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7),
                  inset 0 0 30px rgba(123,44,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
    }

    .cell {
      width: 110px;
      height: 110px;
      background: var(--cell);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 2px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(4px);
    }

    .cell:hover {
      background: rgba(60, 40, 120, 0.8);
      transform: scale(1.06);
      box-shadow: 0 0 25px rgba(123,44,255,0.4);
    }

    .cell.taken {
      cursor: not-allowed;
      pointer-events: none;
    }

    .cell.x {
      color: var(--x);
      text-shadow: 0 0 20px var(--glow-x);
    }

    .cell.o {
      color: var(--o);
      text-shadow: 0 0 20px var(--glow-o);
    }

    .controls {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .btn {
      padding: 14px 32px;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #ff2e63, #7b2cff);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(255,46,99,0.4);
      transition: all 0.3s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(255,46,99,0.6);
    }

    .back-link {
      color: #8888cc;
      text-decoration: none;
      font-size: 1.1rem;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #ff2e63;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 500px) {
      #board {
        grid-template-columns: repeat(3, 90px);
      }
      .cell {
        width: 90px;
        height: 90px;
        font-size: 3.5rem;
      }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <h1>Tic-Tac-Toe ❌⭕</h1>
  <div id="status">Player X's Turn</div>

  <div id="board">
    <div class="cell" onclick="makeMove(0)"></div>
    <div class="cell" onclick="makeMove(1)"></div>
    <div class="cell" onclick="makeMove(2)"></div>
    <div class="cell" onclick="makeMove(3)"></div>
    <div class="cell" onclick="makeMove(4)"></div>
    <div class="cell" onclick="makeMove(5)"></div>
    <div class="cell" onclick="makeMove(6)"></div>
    <div class="cell" onclick="makeMove(7)"></div>
    <div class="cell" onclick="makeMove(8)"></div>
  </div>

  <div class="controls">
    <button class="btn" onclick="resetGame()">Restart Game</button>
    <br>
    <a href="choose.html" class="back-link">← Back to Home</a>
  </div>

  <script>
    let currentPlayer = 'X';
    let gameState = ["", "", "", "", "", "", "", "", ""];
    let gameActive = true;

    const winningConditions = [
      [0,1,2], [3,4,5], [6,7,8], // rows
      [0,3,6], [1,4,7], [2,5,8], // columns
      [0,4,8], [2,4,6]           // diagonals
    ];

    function makeMove(index) {
      if (gameState[index] !== "" || !gameActive) return;

      gameState[index] = currentPlayer;
      const cell = document.getElementsByClassName('cell')[index];
      cell.innerText = currentPlayer;
      cell.classList.add('taken', currentPlayer.toLowerCase());

      checkResult();
    }

    function checkResult() {
      let roundWon = false;
      let winningCombo = null;

      for (let i = 0; i < winningConditions.length; i++) {
        const [a, b, c] = winningConditions[i];
        if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
          roundWon = true;
          winningCombo = [a, b, c];
          break;
        }
      }

      if (roundWon) {
        document.getElementById('status').innerText = `🎉 Player ${currentPlayer} Wins!`;
        document.getElementById('status').style.color = "var(--win)";
        gameActive = false;

        // Highlight winning line
        winningCombo.forEach(idx => {
          document.getElementsByClassName('cell')[idx].style.boxShadow = 
            `0 0 20px var(--${currentPlayer.toLowerCase()}-glow)`;
        });
        return;
      }

      if (!gameState.includes("")) {
        document.getElementById('status').innerText = "It's a Draw! 🤝";
        gameActive = false;
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      document.getElementById('status').innerText = `Player ${currentPlayer}'s Turn`;
    }

    function resetGame() {
      currentPlayer = 'X';
      gameState = ["", "", "", "", "", "", "", "", ""];
      gameActive = true;
      document.getElementById('status').innerText = "Player X's Turn";
      document.getElementById('status').style.color = "var(--text)";

      const cells = document.getElementsByClassName('cell');
      for (let cell of cells) {
        cell.innerText = "";
        cell.className = 'cell';
        cell.style.boxShadow = "";
      }
    }
  </script>
</body>
</html>
