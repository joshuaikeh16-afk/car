<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Division | Elite Performance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        :root {
            --primary: #00d4ff;
            --accent: #ff0055;
            --dark-bg: #0f1016;
            --card-glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #1a1c2c, var(--dark-bg));
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1000px;
            width: 90%;
            padding: 60px 0;
            text-align: center;
        }

        /* --- Header Styling --- */
        .header-section {
            margin-bottom: 60px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -3px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0, 212, 255, 0.2));
        }

        .tagline {
            font-size: 1.2rem;
            color: #8892b0;
            max-width: 600px;
            margin: 20px auto;
            font-weight: 300;
        }

        /* --- Showcase Gallery --- */
        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 50px;
        }

        .img-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.8s ease;
        }

        .img-wrapper:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .img-wrapper:hover img {
            transform: scale(1.1);
        }

        /* --- Tech Specs Section --- */
        .spec-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
            background: var(--card-glass);
            padding: 30px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .spec-item i {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .spec-item span {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #666;
        }

        .spec-item strong {
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* --- Action UI --- */
        .actions {
            margin-top: 40px;
            padding: 50px;
            background: linear-gradient(180deg, transparent, rgba(0, 212, 255, 0.05));
            border-radius: 40px;
        }

        .buy-btn {
            background: var(--primary);
            color: #000;
            padding: 22px 60px;
            border: none;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
        }

        .buy-btn:hover {
            background: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.5);
        }

        .return-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            color: #666;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .return-link:hover {
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .gallery { grid-template-columns: 1fr; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1>Road Division</h1>
            <p class="tagline">Engineered for the 1%. Experience surgical precision and unyielding speed on the tarmac.</p>
        </div>
        
        <div class="gallery">
            <div class="img-wrapper">
                <img src="https://cdn.mos.cms.futurecdn.net/47J7WJppMG3bCz5b6tfjnh-1024-80.jpg.webp" alt="Aero Frame Detail">
            </div>
            <div class="img-wrapper">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcREZhO-EipbC2InjELWk-LoSxdv3a_vfvrWZQ&s" alt="Full View Carbon Bike">
            </div>
        </div>

        <div class="spec-grid">
            <div class="spec-item">
                <i class="fas fa-weight-hanging"></i>
                <span>Frame Weight</span>
                <strong>6.8 KG</strong>
            </div>
            <div class="spec-item">
                <i class="fas fa-wind"></i>
                <span>Drag Coeff</span>
                <strong>0.21 CDA</strong>
            </div>
            <div class="spec-item">
                <i class="fas fa-microchip"></i>
                <span>Shifting</span>
                <strong>Wireless eTap</strong>
            </div>
            <div class="spec-item">
                <i class="fas fa-layer-group"></i>
                <span>Material</span>
                <strong>Carbon T1100</strong>
            </div>
        </div>
        
        <div class="actions">
            <a href="https://www.simbaplanet.com/product-category/bicycles/fitness/" class="buy-btn">
                Unlock Performance <i class="fas fa-bolt"></i>
            </a>
            <br>
            <a href="bikes.html" class="return-link">
                <i class="fas fa-chevron-left"></i> Explore Other Models
            </a>
        </div>
    </div>

</body>
</html>
